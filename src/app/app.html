@if (showIntro()) {
  <app-intro (done)="onIntroDone()" />
}

<div class="global-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<app-navbar></app-navbar>

<!-- Site logo — top right, mirrors hamburger position -->
<div class="site-logo">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Circle background -->
    <circle cx="50" cy="50" r="50" fill="#110c04"/>
    <!-- Outer subtle ring -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="#b8520a" stroke-width="0.6" opacity="0.5"/>
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#110c04" stop-opacity="0"/>
    </radialGradient>
    <circle cx="50" cy="50" r="44" fill="url(#innerGlow)"/>

    <!-- Fiber cables -->
    <!-- Center cable (brightest) -->
    <path d="M50,72 L50,32" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Inner left -->
    <path d="M43,72 Q43,52 35,33" stroke="#e8740c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- Inner right -->
    <path d="M57,72 Q57,52 65,33" stroke="#e8740c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- Outer left -->
    <path d="M36,72 Q34,50 20,36" stroke="#b8520a" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Outer right -->
    <path d="M64,72 Q66,50 80,36" stroke="#b8520a" stroke-width="2.2" stroke-linecap="round" fill="none"/>

    <!-- Glow dot — center tip -->
    <circle cx="50" cy="32" r="5.5" fill="#f59e0b"/>
    <circle cx="50" cy="32" r="9"   fill="#f59e0b" opacity="0.15"/>
    <!-- Inner tip dots -->
    <circle cx="35" cy="33" r="3.5" fill="#e8740c"/>
    <circle cx="65" cy="33" r="3.5" fill="#e8740c"/>
    <!-- Outer tip dots -->
    <circle cx="20" cy="36" r="2.5" fill="#b8520a"/>
    <circle cx="80" cy="36" r="2.5" fill="#b8520a"/>

    <!-- Bottom panel -->
    <rect x="18" y="73" width="64" height="8" rx="2" fill="#1c1308" stroke="#b8520a" stroke-width="0.8"/>
    <!-- Ports -->
    <rect x="27" y="75" width="6" height="4" rx="1" fill="#3d2a0a"/>
    <rect x="35" y="75" width="6" height="4" rx="1" fill="#3d2a0a"/>
    <rect x="43" y="75" width="6" height="4" rx="1" fill="#e8740c" opacity="0.6"/>
    <rect x="51" y="75" width="6" height="4" rx="1" fill="#3d2a0a"/>
    <rect x="59" y="75" width="6" height="4" rx="1" fill="#3d2a0a"/>
    <rect x="67" y="75" width="6" height="4" rx="1" fill="#3d2a0a"/>
  </svg>
</div>
<main class="main" [class.page-enter]="entering()">
  <router-outlet></router-outlet>
</main>
