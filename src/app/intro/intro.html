<div class="intro-overlay" [class.fade-out]="fading">
  <div class="intro-logo">
    <svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes drawFiber1 {
          0%, 5% { stroke-dashoffset: 120; opacity: 0; }
          8% { opacity: 1; }
          30% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 1; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 120; opacity: 0; }
        }
        @keyframes drawFiber2 {
          0%, 8% { stroke-dashoffset: 110; opacity: 0; }
          12% { opacity: 1; }
          35% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 1; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 110; opacity: 0; }
        }
        @keyframes drawFiber3 {
          0%, 10% { stroke-dashoffset: 110; opacity: 0; }
          15% { opacity: 1; }
          35% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 1; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 110; opacity: 0; }
        }
        @keyframes drawFiberOuter {
          0%, 12% { stroke-dashoffset: 100; opacity: 0; }
          18% { opacity: 0.7; }
          38% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 0.7; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 100; opacity: 0; }
        }
        @keyframes burstIn {
          0%, 25% { r: 0; opacity: 0; }
          35% { r: 6; opacity: 1; }
          40% { r: 8; opacity: 0.9; }
          50% { r: 5; opacity: 0.9; }
          55% { r: 7; opacity: 1; }
          60% { r: 5; opacity: 0.9; }
          65% { r: 7; opacity: 1; }
          70% { r: 5; opacity: 0.9; }
          75% { r: 7; opacity: 1; }
          80% { r: 6; opacity: 1; }
          90% { r: 6; opacity: 0.8; }
          95% { r: 0; opacity: 0; }
          100% { r: 0; opacity: 0; }
        }
        @keyframes glowPulse {
          0%, 25% { r: 0; opacity: 0; }
          35% { r: 14; opacity: 0.12; }
          50% { r: 12; opacity: 0.08; }
          55% { r: 18; opacity: 0.14; }
          60% { r: 12; opacity: 0.08; }
          65% { r: 18; opacity: 0.14; }
          70% { r: 12; opacity: 0.08; }
          75% { r: 18; opacity: 0.14; }
          80% { r: 14; opacity: 0.1; }
          90% { r: 14; opacity: 0.06; }
          95% { r: 0; opacity: 0; }
          100% { r: 0; opacity: 0; }
        }
        @keyframes glowOuter {
          0%, 30% { r: 0; opacity: 0; }
          40% { r: 22; opacity: 0.05; }
          80% { r: 20; opacity: 0.04; }
          95% { r: 0; opacity: 0; }
          100% { r: 0; opacity: 0; }
        }
        @keyframes dotAppear {
          0%, 28% { r: 0; opacity: 0; }
          38% { r: 4; opacity: 0.8; }
          85% { r: 4; opacity: 0.8; }
          95% { r: 0; opacity: 0; }
          100% { r: 0; opacity: 0; }
        }
        @keyframes dotAppearSmall {
          0%, 30% { r: 0; opacity: 0; }
          40% { r: 2.5; opacity: 0.5; }
          85% { r: 2.5; opacity: 0.5; }
          95% { r: 0; opacity: 0; }
          100% { r: 0; opacity: 0; }
        }
        @keyframes panelFade {
          0%, 20% { opacity: 0; }
          32% { opacity: 0.7; }
          85% { opacity: 0.7; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }
        @keyframes portBlink {
          0%, 30% { opacity: 0; }
          38% { opacity: 0.3; }
          45% { opacity: 0.15; }
          52% { opacity: 0.35; }
          60% { opacity: 0.2; }
          68% { opacity: 0.35; }
          76% { opacity: 0.2; }
          84% { opacity: 0.35; }
          90% { opacity: 0.25; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }
        @keyframes ringReveal {
          0%, 12% { stroke-dashoffset: 440; opacity: 0; }
          20% { opacity: 0.25; }
          45% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 0.25; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 440; opacity: 0; }
        }
        @keyframes titleFade {
          0%, 32% { opacity: 0; }
          42% { opacity: 1; }
          85% { opacity: 1; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }
        @keyframes subtitleFade {
          0%, 38% { opacity: 0; }
          48% { opacity: 1; }
          85% { opacity: 1; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }
        @keyframes lineDraw {
          0%, 35% { stroke-dashoffset: 160; opacity: 0; }
          40% { opacity: 0.3; }
          50% { stroke-dashoffset: 0; }
          85% { stroke-dashoffset: 0; opacity: 0.3; }
          95% { opacity: 0; }
          100% { stroke-dashoffset: 160; opacity: 0; }
        }
        @keyframes serviceFade {
          0%, 45% { opacity: 0; }
          55% { opacity: 1; }
          85% { opacity: 1; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }
        @keyframes taglineFade {
          0%, 50% { opacity: 0; }
          60% { opacity: 1; }
          85% { opacity: 1; }
          95% { opacity: 0; }
          100% { opacity: 0; }
        }

        .intro-fiber1   { stroke-dasharray: 120; animation: drawFiber1 8s ease-in-out infinite; }
        .intro-fiber2   { stroke-dasharray: 110; animation: drawFiber2 8s ease-in-out infinite; }
        .intro-fiber3   { stroke-dasharray: 110; animation: drawFiber3 8s ease-in-out infinite; }
        .intro-fiber-outer { stroke-dasharray: 100; animation: drawFiberOuter 8s ease-in-out infinite; }
        .intro-burst    { animation: burstIn    8s ease-in-out infinite; }
        .intro-glow1    { animation: glowPulse  8s ease-in-out infinite; }
        .intro-glow2    { animation: glowOuter  8s ease-in-out infinite; }
        .intro-dot      { animation: dotAppear  8s ease-in-out infinite; }
        .intro-dot-sm   { animation: dotAppearSmall 8s ease-in-out infinite; }
        .intro-ring     { stroke-dasharray: 440; animation: ringReveal 8s ease-in-out infinite; }
        .intro-panel    { animation: panelFade  8s ease-in-out infinite; }
        .intro-port     { animation: portBlink  8s ease-in-out infinite; }
        .intro-title    { animation: titleFade  8s ease-in-out infinite; }
        .intro-subtitle { animation: subtitleFade 8s ease-in-out infinite; }
        .intro-divider  { stroke-dasharray: 160; animation: lineDraw 8s ease-in-out infinite; }
        .intro-svc      { animation: serviceFade 8s ease-in-out infinite; }
        .intro-tag      { animation: taglineFade 8s ease-in-out infinite; }
      </style>

      <rect x="0" y="0" width="680" height="540" rx="12" fill="#110c04"/>

      <g transform="translate(340, 120)">
        <circle cx="0" cy="0" r="70" fill="none" stroke="#5e4a2e" stroke-width="0.4" class="intro-ring"/>

        <path d="M0,52 L0,-30" fill="none" stroke="#e8740c" stroke-width="4" stroke-linecap="round" class="intro-fiber1"/>
        <path d="M-24,52 Q-24,10 -36,-26" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" class="intro-fiber2"/>
        <path d="M24,52 Q24,10 36,-26" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" class="intro-fiber3"/>
        <path d="M-44,48 Q-42,8 -56,-20" fill="none" stroke="#e8740c" stroke-width="2" stroke-linecap="round" class="intro-fiber-outer"/>
        <path d="M44,48 Q42,8 56,-20" fill="none" stroke="#e8740c" stroke-width="2" stroke-linecap="round" class="intro-fiber-outer"/>

        <circle cx="0" cy="-30" r="0" fill="#f59e0b" class="intro-burst"/>
        <circle cx="0" cy="-30" r="0" fill="#f59e0b" class="intro-glow1"/>
        <circle cx="0" cy="-30" r="0" fill="#f59e0b" class="intro-glow2"/>
        <circle cx="-36" cy="-26" r="0" fill="#e8740c" class="intro-dot"/>
        <circle cx="36"  cy="-26" r="0" fill="#e8740c" class="intro-dot"/>
        <circle cx="-56" cy="-20" r="0" fill="#e8740c" class="intro-dot-sm"/>
        <circle cx="56"  cy="-20" r="0" fill="#e8740c" class="intro-dot-sm"/>

        <g class="intro-panel">
          <rect x="-52" y="48" width="104" height="10" rx="2" fill="#1c1308" stroke="#b8520a" stroke-width="0.8"/>
        </g>
        <rect x="-4"  y="49" width="8" height="8" rx="1" fill="#e8740c" class="intro-port"/>
        <rect x="-20" y="49" width="8" height="8" rx="1" fill="#f59e0b" class="intro-port"/>
        <rect x="12"  y="49" width="8" height="8" rx="1" fill="#f59e0b" class="intro-port"/>
        <rect x="-36" y="49" width="8" height="8" rx="1" fill="#e8740c" class="intro-port"/>
        <rect x="28"  y="49" width="8" height="8" rx="1" fill="#e8740c" class="intro-port"/>
      </g>

      <g class="intro-title">
        <text x="340" y="245" text-anchor="middle" fill="#f5ede4" font-size="48" font-weight="500"
              letter-spacing="4" font-family="system-ui, -apple-system, sans-serif">BALCITA</text>
      </g>

      <line x1="185" y1="270" x2="330" y2="270" stroke="#e8740c" stroke-width="1.2" class="intro-divider"/>
      <line x1="350" y1="270" x2="495" y2="270" stroke="#e8740c" stroke-width="1.2" class="intro-divider"/>
      <g class="intro-subtitle">
        <circle cx="340" cy="270" r="2.5" fill="#e8740c" opacity="0.5"/>
      </g>

      <g class="intro-subtitle">
        <text x="340" y="305" text-anchor="middle" fill="#e8740c" font-size="18" font-weight="500"
              letter-spacing="3" font-family="system-ui, -apple-system, sans-serif">FIBER OPTIC</text>
        <text x="340" y="335" text-anchor="middle" fill="#c9b899" font-size="13"
              letter-spacing="6" font-family="system-ui, -apple-system, sans-serif">INSTALLATION SERVICE</text>
      </g>

      <g class="intro-svc" transform="translate(340, 400)">
        <rect x="-175" y="-22" width="350" height="44" rx="22" fill="none" stroke="#5e4a2e" stroke-width="0.5" opacity="0.25"/>
        <circle cx="-120" cy="0" r="12" fill="none" stroke="#e8740c" stroke-width="0.8" opacity="0.5"/>
        <line x1="-126" y1="0" x2="-121" y2="0" stroke="#e8740c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <line x1="-119" y1="0" x2="-114" y2="0" stroke="#e8740c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <circle cx="-120" cy="0" r="2" fill="#f59e0b" opacity="0.7"/>
        <circle cx="-40" cy="0" r="12" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
        <rect x="-46" y="-5" width="5" height="10" rx="1" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
        <rect x="-39" y="-7" width="5" height="14" rx="1" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
        <rect x="-32" y="-3" width="5" height="8"  rx="1" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
        <circle cx="40" cy="0" r="12" fill="none" stroke="#e8740c" stroke-width="0.8" opacity="0.5"/>
        <circle cx="40" cy="0" r="5"  fill="none" stroke="#e8740c" stroke-width="1"   opacity="0.5"/>
        <circle cx="40" cy="0" r="1.5" fill="#e8740c" opacity="0.6"/>
        <path d="M34,-3 L37,0 L34,3" fill="none" stroke="#e8740c" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <path d="M46,-3 L43,0 L46,3" fill="none" stroke="#e8740c" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
        <circle cx="120" cy="0" r="12" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
        <path d="M115,-4 L119,1 L125,-5" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <line x1="114" y1="5" x2="126" y2="5" stroke="#f59e0b" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      </g>

      <g class="intro-svc" transform="translate(340, 428)">
        <text x="-120" y="0" text-anchor="middle" fill="#6b5d4f" font-size="8" letter-spacing="1" font-family="system-ui, -apple-system, sans-serif">SPLICE</text>
        <text x="-40"  y="0" text-anchor="middle" fill="#6b5d4f" font-size="8" letter-spacing="1" font-family="system-ui, -apple-system, sans-serif">BUILD</text>
        <text x="40"   y="0" text-anchor="middle" fill="#6b5d4f" font-size="8" letter-spacing="1" font-family="system-ui, -apple-system, sans-serif">TEST</text>
        <text x="120"  y="0" text-anchor="middle" fill="#6b5d4f" font-size="8" letter-spacing="1" font-family="system-ui, -apple-system, sans-serif">CERTIFY</text>
      </g>

      <g class="intro-tag">
        <text x="340" y="490" text-anchor="middle" fill="#5e4a2e" font-size="9"
              letter-spacing="3" font-family="system-ui, -apple-system, sans-serif">PROJECT-BASED FIBER OPTIC SUB-CONTRACTOR</text>
      </g>
    </svg>
  </div>
</div>
